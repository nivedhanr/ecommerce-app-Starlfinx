@if (loading()) {
  <p>Loading product...</p>
  }
  
  @if (error()) {
  <p>{{ error() }}</p>
  }
  <div class="product-detail-page">
  @if (product(); as product) {
    

      <div class="product-detail-container">
      
        <mat-card class="product-detail-card">
      
          <div class="product-layout">
      
            <div class="image-section">
      
              <img
                [src]="product.thumbnail"
                [alt]="product.title" />
      
            </div>
      
            <div class="info-section">
      
              <h1>
                {{ product.title }}
              </h1>
      
              <span class="category-chip">
                {{ product.category }}
              </span>
      
              <p class="description">
                {{ product.description }}
              </p>
      
              <div class="product-meta">
      
                <span class="rating">
                  ⭐ {{ product.rating }}
                </span>
      
                <span class="stock">
                  Stock: {{ product.stock }}
                </span>
      
              </div>
      
              <h2 class="price">
      
                ₹ {{ product.price }}
      
              </h2>
      
              <button
                class="add-cart-btn"
                type="button"
                (click)="addToCart()">
      
                Add To Cart
      
              </button>
      
            </div>
      
          </div>
      
        </mat-card>
      
      </div>
      
      }
    </div>
