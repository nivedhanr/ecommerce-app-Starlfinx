<nav class="navbar">
  <div class="navbar-logo">
    <button class="menu-toggle" (click)="toggleMenu()">
      ☰
    </button>
    <span class="logo-icon"> 🛒 </span>

    <span class="logo-text"> Starlfinx Store </span>
  </div>

  <div class="navbar-content" [class.mobile-open]="mobileMenuOpen()">

    <div class="navbar-links">
      <a routerLink="/products" (click)="closeMenu()"> Products </a>

      <a routerLink="/product-management" (click)="closeMenu()"> Product Management </a>

      <a routerLink="/cart" (click)="closeMenu()"> Cart </a>

      <a routerLink="/checkout" (click)="closeMenu()"> Checkout </a>
    </div>

    <div class="navbar-auth">
      @if (!isAuthenticated()) {
      <a routerLink="/login"> Login </a>
      } @else {
      <button type="button" (click)="logout()">Logout</button>
      }
    </div>
  </div>
</nav>
